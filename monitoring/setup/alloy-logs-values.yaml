## Grafana Alloy Helm Chart: AKS Log Collection
## Optimized logic to STRICTLY separate Deployments from StatefulSets/Standalone pods

alloy:
  configReloader:
    enabled: true
  configMap:
    create: true
    content: |-
      // ------------------------------------------------------------------
      // 1. DISCOVERY: Find all Kubernetes pods
      // ------------------------------------------------------------------
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // ------------------------------------------------------------------
      // 2. RELABEL: Extract accurate metadata
      // ------------------------------------------------------------------
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        // Base Labels
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_controller_kind"]
          target_label  = "kind"
        }

        // --- Workload Extraction (The Deployment Label) ---

        // RULE 1: Deployments (managed by ReplicaSets)
        // We look for ReplicaSets specifically and strip the random hash (8-10 chars).
        // This regex (.+)-[a-z0-9]{8,11}$ is very strict to avoid matching words like "-db" or "-lb".
        rule {
          source_labels = ["__meta_kubernetes_pod_controller_kind", "__meta_kubernetes_pod_controller_name"]
          separator     = ";"
          regex         = "ReplicaSet;(.+)-[a-z0-9]{8,11}$"
          replacement   = "$1"
          target_label  = "deployment"
        }

        // RULE 2: Fallback for StatefulSets / DaemonSets / Jobs
        // If 'deployment' is still empty, use the full controller name.
        // This ensures 'payment-db' stays 'payment-db'.
        rule {
          source_labels = ["deployment", "__meta_kubernetes_pod_controller_name"]
          separator     = ";"
          regex         = "^$;(.+)"
          replacement   = "$1"
          target_label  = "deployment"
          action        = "replace"
        }

        // RULE 3: Fallback for pods without a controller
        rule {
          source_labels = ["deployment", "__meta_kubernetes_pod_name"]
          separator     = ";"
          regex         = "^$;(.+)"
          replacement   = "$1"
          target_label  = "deployment"
          action        = "replace"
        }
      }

      // ------------------------------------------------------------------
      // 3. LOGS: Tail pod logs via Kubernetes API
      // ------------------------------------------------------------------
      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.enrich.receiver]
      }

      // ------------------------------------------------------------------
      // 4. PROCESS: Add global cluster label
      // ------------------------------------------------------------------
      loki.process "enrich" {
        stage.static_labels {
          values = {
            cluster     = "artha-aks-cluster",
          }
        }
        forward_to = [loki.write.central_server.receiver]
      }

      // ------------------------------------------------------------------
      // 5. DESTINATION: Push to Central Loki on VM
      // ------------------------------------------------------------------
      loki.write "central_server" {
        endpoint {
          url = "http://10.0.2.4:3100/loki/api/v1/push"
        }
      }

controller:
  type: daemonset
